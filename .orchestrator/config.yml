# Planner + Worker: local LM Studio — Qwen2.5-Coder-14B on port 1234
planner:
  provider: local
  base_url: http://localhost:1234/v1
  model: qwen/qwen2.5-coder-14b

worker:
  provider: local
  base_url: http://localhost:1234/v1
  model: qwen/qwen2.5-coder-14b
  fallback:
  max_iterations: 8
  stuck_threshold: 3

judge:
  symbol_only_threshold: 15
  close_threshold: 100

embeddings:
  provider: mcp
  tool: mcp__decomp-me-mcp__decomp_search_context
  top_k: 5

paths:
  queue: .orchestrator/queue.json
  log: .orchestrator/log.jsonl
  takeaways: .orchestrator/takeaways.md
  ask_human: .orchestrator/ask_human
  stubs_dir: src/stubs
  src_dir: src
  asm_dir: asm
  decomp_results: tools/decomp_results.json
