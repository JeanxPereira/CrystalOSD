name: Progress Report

on:
  push:
    branches: [main]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libc6:i386 libstdc++6:i386 make curl

      - name: Download PS2DEV Toolchain (Modern)
        run: |
          curl -sSL https://github.com/ps2dev/ps2dev/releases/latest/download/ps2dev-ubuntu-latest.tar.gz | tar -xz -C /tmp
          echo "PS2DEV=/tmp/ps2dev" >> $GITHUB_ENV
          echo "PS2SDK=/tmp/ps2dev/ps2sdk" >> $GITHUB_ENV
          echo "/tmp/ps2dev/bin:/tmp/ps2dev/ee/bin" >> $GITHUB_PATH

      - name: Download ee-gcc 2.9 (Classic)
        run: |
          mkdir -p /tmp/compiler
          curl -sSL https://github.com/decompme/compilers/releases/download/compilers/ee-gcc2.9-991111.tar.gz | tar -xz -C /tmp/compiler
          
      - name: Download wibo
        run: |
          curl -sL https://github.com/decompals/wibo/releases/latest/download/wibo -o /tmp/wibo
          chmod +x /tmp/wibo

      - name: Build
        run: make all CC="/tmp/wibo /tmp/compiler/bin/ee-gcc.exe"

      - name: Download objdiff-cli
        run: |
          curl -sSL https://github.com/encounter/objdiff/releases/download/v3.6.1/objdiff-cli-linux-x86_64 -o objdiff-cli
          chmod +x objdiff-cli

      - name: Generate progress report
        run: ./objdiff-cli report generate -o report.json

      - name: Upload progress report
        uses: actions/upload-artifact@v4
        with:
          name: HDDOSD_110U_report
          path: report.json