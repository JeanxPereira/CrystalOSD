name: Progress Report

on:
  push:
    branches: [main]

jobs:
  report:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ps2dev/ps2dev:latest
    steps:
      - name: Install build tools
        run: apk add --no-cache make curl ca-certificates mpc1 mpfr4 gmp

      - uses: actions/checkout@v4

      - name: Build
        run: make all

      - name: Download objdiff-cli
        run: |
          curl -sSL \
            https://github.com/encounter/objdiff/releases/download/v3.6.1/objdiff-cli-linux-x86_64 \
            -o objdiff-cli
          chmod +x objdiff-cli

      - name: Generate progress report
        run: ./objdiff-cli report generate -o report.json

      - name: Upload progress report
        uses: actions/upload-artifact@v4
        with:
          name: HDDOSD_110U_report
          path: report.json